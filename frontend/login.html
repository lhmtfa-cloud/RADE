<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - REDE</title><!--  Rafael Evangelista Document Extration -->
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <div class="container" style="max-width: 400px; margin: auto;">
    <div style="text-align: center; margin-bottom: 1rem; color: var(--primary-color);">
        <i class="fas fa-robot fa-3x"></i>
    </div>
    <h1>Entrar na REDE</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="Seu nome de usuário" required>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Sua senha secreta" required>
      </div>
      <button type="submit" style="width: 100%; max-width: 100%; margin-top: 10px;">Entrar</button>
      <p id="error-message" class="error-text"></p>
    </form>
  </div>
  
  <footer>
    <p>Feito por Rafael</p>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = e.target.username.value;
      const password = e.target.password.value;
      const errorMessage = document.getElementById('error-message');
  
      const details = {
          'username': username,
          'password': password
      };
      const formBody = Object.keys(details).map(key => encodeURIComponent(key) + '=' + encodeURIComponent(details[key])).join('&');

      try {
        const response = await fetch('/token', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
          },
          body: formBody
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.detail || 'Falha no login');
        }

        const data = await response.json();
        localStorage.setItem('accessToken', data.access_token);
        window.location.href = '/app';

      } catch (error) {
        errorMessage.textContent = 'Erro: ' + error.message;
        console.error('Login error:', error);
      }
    });
  </script>
</body>
</html>

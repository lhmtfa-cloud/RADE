<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - REDE</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div class="container admin-panel">
        <div class="header-nav">
          <div class="header-nav-left">
            <h1 style="text-align: left; margin: 0;"><i class="fas fa-shield-alt"></i> Dashboard Admin</h1>
          </div>
          <div class="header-nav-right">
            <div class="settings-row admin-dark-mode-row" style="margin-right: 15px;">
              <i class="fas fa-moon" style="color: var(--text-color);"></i>
              <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
              </label>
            </div>
            <a href="/app" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <button id="logout-button" class="nav-button"><i class="fas fa-sign-out-alt"></i></button>
          </div>
        </div>

        <section id="stats-section">
            <h2><i class="fas fa-chart-bar"></i> Estatísticas de Uso</h2>
            <div class="table-container">
                <table id="stats-table">
                    <thead>
                        <tr>
                            <th>Usuário</th>
                            <th>Uploads</th>
                            <th>Requisições</th>
                            <th>Última Atividade</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="uploads-section">
            <h2><i class="fas fa-cloud-upload-alt"></i> Uploads Recentes (24h)</h2>
            <div class="table-container">
                <table id="uploads-table">
                    <thead>
                        <tr>
                            <th>Usuário</th>
                            <th>Arquivo</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Download</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="users-section">
            <h2><i class="fas fa-users"></i> Gerenciar Usuários</h2>
            <div class="table-container">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>Usuário</th>
                            <th>Papel</th>
                            <th>Criado em</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="create-user-form" style="background: var(--input-bg); padding: 1.5rem; border-radius: var(--radius-md); margin-top: 1rem;">
                <h3 style="font-size: 1rem; margin-bottom: 1rem;"><i class="fas fa-user-plus"></i> Novo Usuário</h3>
                <input type="text" id="new-username" placeholder="Nome de usuário" required>
                <input type="password" id="new-password" placeholder="Senha" required>
                <select id="new-user-role">
                    <option value="user">Usuário Padrão</option>
                    <option value="admin">Administrador</option>
                </select>
                <button id="create-user-btn" style="width: auto; margin: 0;">Criar Usuário</button>
            </div>
        </section>

    </div>
    
    <footer>
        <p>Feito por Rafael</p>
    </footer>

    <script src="/static/admin.js"></script>
</body>
</html>
